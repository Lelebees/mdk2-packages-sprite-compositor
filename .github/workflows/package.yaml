name: Package Shared Projects

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check NuGet version (optional)
        run: nuget.exe help || echo "nuget.exe not found"

      - name: Run packaging script
        shell: pwsh
        run: |
          .\scripts\package.ps1

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: NuGetPackages
