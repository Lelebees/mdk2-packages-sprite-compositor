name: Package Shared Projects

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check NuGet version (optional)
        run: nuget.exe help || echo "nuget.exe not found"

      - name: Run packaging script
        shell: pwsh
        run: |
          .\scripts\package.ps1

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: NuGetPackages
  
  publish:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download NuGet packages artifact
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: downloaded-packages

      - name: Publish packages to GitHub NuGet feed
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
          Get-ChildItem -Path downloaded-packages -Filter *.nupkg | ForEach-Object {
              Write-Host "Publishing package $($_.Name)..."
              nuget push $_.FullName -Source $sourceUrl -ApiKey $env:GITHUB_TOKEN
          }