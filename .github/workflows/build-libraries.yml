name: Build Libraries

on:
  push:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  pull_request:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build (folder name in libraries/), or leave empty to build all'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      has-packages: ${{ steps.build-summary.outputs.has-packages }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SteamCMD
      uses: CyberAndrii/setup-steamcmd@v1.1.5
    
    - name: Install Space Engineers Dedicated Server
      shell: pwsh
      run: |
        $installDir = Join-Path $env:GITHUB_WORKSPACE "se"
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        
        # Try multiple times with different approaches
        $attempts = @(
          "+@sSteamCmdForcePlatformType windows +force_install_dir `"$installDir`" +login anonymous +app_update 298740 validate +quit",
          "+force_install_dir `"$installDir`" +login anonymous +app_update 298740 validate +quit",
          "+@NoPromptForPassword 1 +force_install_dir `"$installDir`" +login anonymous +app_update 298740 +quit"
        )
        
        $success = $false
        foreach ($attempt in $attempts) {
          Write-Host "Trying: steamcmd $attempt"
          $cmd = "steamcmd $attempt"
          Invoke-Expression $cmd
          if ($LASTEXITCODE -eq 0) {
            $success = $true
            break
          }
          Write-Host "Attempt failed with exit code $LASTEXITCODE, trying next approach..."
          Start-Sleep -Seconds 5
        }
        
        if (-not $success) {
          Write-Error "All SteamCMD installation attempts failed"
          exit 1
        }
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Add GitHub Packages source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/malforge/index.json" `
          --name "GitHub" `
          --username ${{ github.actor }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text
    
    - name: Build Libraries
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $ErrorActionPreference = "Stop"
        
        # Determine which packages to build
        $packagesToBuild = @()
        if ("${{ github.event.inputs.package_name }}" -ne "") {
          $packagesToBuild = @("${{ github.event.inputs.package_name }}")
          Write-Host "Building single package: ${{ github.event.inputs.package_name }}"
        } else {
          $allPackages = Get-ChildItem -Path "libraries" -Directory | Where-Object { $_.Name -ne ".idea" }
          $packagesToBuild = $allPackages | ForEach-Object { $_.Name }
          Write-Host "Building all packages: $($packagesToBuild -join ', ')"
        }
        
        $sedsPath = "$env:GITHUB_WORKSPACE\se"
        $binPath = Join-Path $sedsPath "DedicatedServer64"
        $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
        
        $builtPackages = @()
        $skippedPackages = @()
        
        foreach ($package in $packagesToBuild) {
          Write-Host ""
          Write-Host "=== Processing: $package ===" -ForegroundColor Cyan
          
          # Check if package has a demo project
          $demoProj = Get-ChildItem -Path "libraries\$package" -Recurse -Filter "*.Demo.csproj" | Select-Object -First 1
          if (-not $demoProj) {
            Write-Host "No demo project found - skipping" -ForegroundColor Yellow
            $skippedPackages += $package
            continue
          }
          
          Write-Host "Found demo project: $($demoProj.Name)"
          
          # Get version from _version file
          $versionFile = Get-ChildItem -Path "libraries\$package" -Recurse -Filter "_version" | Select-Object -First 1
          if (-not $versionFile) {
            Write-Host "No _version file found - skipping" -ForegroundColor Yellow
            $skippedPackages += $package
            continue
          }
          
          $localVersion = (Get-Content $versionFile.FullName).Trim()
          Write-Host "Local version: $localVersion"
          
          # Check if this version already exists in NuGet
          $packageName = $package
          $shouldBuild = $true
          
          try {
            $searchOutput = dotnet nuget search $packageName --source $sourceUrl --format json 2>&1
            if ($LASTEXITCODE -eq 0 -and $searchOutput -match '^\s*\{') {
              $nugetVersions = $searchOutput | ConvertFrom-Json
              
              if ($nugetVersions.searchResult -and $nugetVersions.searchResult.Count -gt 0) {
                $existingPackage = $nugetVersions.searchResult | Where-Object { $_.packages.id -eq $packageName } | Select-Object -First 1
                if ($existingPackage -and $existingPackage.packages -and $existingPackage.packages.Count -gt 0) {
                  $publishedVersion = $existingPackage.packages[0].version
                  Write-Host "Published version: $publishedVersion"
                  
                  if ($localVersion -eq $publishedVersion) {
                    Write-Host "Version $localVersion already published - skipping" -ForegroundColor Yellow
                    $skippedPackages += $package
                    $shouldBuild = $false
                  } elseif ([version]$localVersion -le [version]$publishedVersion) {
                    Write-Host "Local version $localVersion is not higher than published $publishedVersion - skipping" -ForegroundColor Yellow
                    $skippedPackages += $package
                    $shouldBuild = $false
                  }
                }
              } else {
                Write-Host "No published version found - will build"
              }
            } else {
              Write-Host "Could not query NuGet feed (may not exist yet) - will build"
            }
          } catch {
            Write-Host "Could not query NuGet feed: $_" -ForegroundColor Yellow
            Write-Host "Will build package anyway"
          }
          
          if (-not $shouldBuild) {
            continue
          }
          
          # Create mdk.local.ini with Space Engineers path
          $mdkLocalIni = Join-Path $demoProj.Directory.FullName "mdk.local.ini"
          $content = "[mdk]`noutput = auto`nbinarypath = $binPath"
          Set-Content -Path $mdkLocalIni -Value $content -Encoding UTF8
          Write-Host "Configured build environment"
          
          # Restore and build
          Write-Host "Restoring project..."
          dotnet restore "$($demoProj.FullName)"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to restore $package"
            exit 1
          }
          
          Write-Host "Building project in Release mode..."
          dotnet build "$($demoProj.FullName)" -c Release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to build $package"
            exit 1
          }
          
          # Find generated NuGet package
          $nupkg = Get-ChildItem -Path "libraries\$package" -Recurse -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) {
            Write-Error "No .nupkg file generated for $package"
            exit 1
          }
          
          Write-Host "Found package: $($nupkg.Name)" -ForegroundColor Green
          
          $builtPackages += $package
        }
        
        Write-Host ""
        Write-Host "=== Build Summary ===" -ForegroundColor Cyan
        Write-Host "Built: $($builtPackages.Count) packages"
        if ($builtPackages.Count -gt 0) {
          $builtPackages | ForEach-Object { Write-Host "  - $_" -ForegroundColor Green }
        }
        Write-Host "Skipped: $($skippedPackages.Count) packages"
        if ($skippedPackages.Count -gt 0) {
          $skippedPackages | ForEach-Object { Write-Host "  - $_" -ForegroundColor Yellow }
        }
        
        echo "has-packages=$($builtPackages.Count -gt 0)" >> $env:GITHUB_OUTPUT
    
    - name: Set build summary output
      id: build-summary
      shell: pwsh
      run: |
        $nupkgs = Get-ChildItem -Path "libraries" -Recurse -Filter "*.nupkg"
        $hasPackages = $nupkgs.Count -gt 0
        echo "has-packages=$hasPackages" >> $env:GITHUB_OUTPUT
    
    - name: Upload package artifacts
      if: steps.build-summary.outputs.has-packages == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: libraries/**/*.nupkg
        if-no-files-found: error
  
  publish:
    needs: build
    if: needs.build.outputs.has-packages == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    
    steps:
    - name: Download package artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: packages
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Publish to GitHub Packages
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
        Get-ChildItem -Path packages -Filter *.nupkg -Recurse | ForEach-Object {
            Write-Host "Publishing package $($_.Name) to GitHub Packages..."
            dotnet nuget push $_.FullName --source $sourceUrl --api-key $env:GITHUB_TOKEN --skip-duplicate
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Successfully published $($_.Name)" -ForegroundColor Green
            } else {
              Write-Warning "Failed to publish $($_.Name)"
            }
        }
