name: Build Libraries

on:
  push:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  pull_request:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build (folder name in libraries/), or leave empty to build all'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed-packages.outputs.packages }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Detect changed packages
      id: changed-packages
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          if [ -n "${{ github.event.inputs.package_name }}" ]; then
            # Build specific package
            echo "packages=[\"${{ github.event.inputs.package_name }}\"]" >> $GITHUB_OUTPUT
          else
            # Build all packages when manually triggered without package name
            PACKAGES=$(find libraries -mindepth 1 -maxdepth 1 -type d ! -name ".idea" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "Building all packages: $PACKAGES"
          fi
        else
          # Get changed files in libraries/ directory
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep '^libraries/' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract unique package folder names
          PACKAGES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Changed packages: $PACKAGES"
        fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: windows-latest
    strategy:
      matrix:
        package_name: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Cache build dependencies
      id: cache-seds
      uses: actions/cache@v4
      with:
        path: D:\SEDS
        key: seds-298740-v1
    
    - name: Install build dependencies
      if: steps.cache-seds.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Write-Host "Setting up build dependencies..."
        
        # Download SteamCMD
        $steamCmdZip = "$env:TEMP\steamcmd.zip"
        $steamCmdDir = "$env:TEMP\steamcmd"
        New-Item -Path $steamCmdDir -ItemType Directory -Force | Out-Null
        
        Invoke-WebRequest -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -OutFile $steamCmdZip -UseBasicParsing | Out-Null
        Expand-Archive -Path $steamCmdZip -DestinationPath $steamCmdDir -Force
        
        # Install Space Engineers Dedicated Server (App ID: 298740)
        $sedsPath = "D:\SEDS"
        $logFile = "$env:TEMP\steamcmd_install.log"
        
        & "$steamCmdDir\steamcmd.exe" +force_install_dir $sedsPath +login anonymous +app_update 298740 validate +quit 2>&1 | Tee-Object -FilePath $logFile | Out-Null
        
        if ($LASTEXITCODE -ne 0 -or -not (Test-Path "$sedsPath\DedicatedServer64")) {
          Write-Error "Failed to install build dependencies"
          Write-Host "Installation log:"
          Get-Content $logFile
          exit 1
        }
        
        Write-Host "Build dependencies installed"
    
    - name: Configure build environment
      shell: pwsh
      run: |
        $sedsPath = "D:\SEDS"
        $binPath = Join-Path $sedsPath "DedicatedServer64"
        
        # Find the demo project for this package
        $demoProj = Get-ChildItem -Path "libraries\${{ matrix.package_name }}" -Recurse -Filter "*.Demo.csproj" | Select-Object -First 1
        if ($demoProj) {
          $mdkLocalIni = Join-Path $demoProj.Directory.FullName "mdk.local.ini"
          
          # Create mdk.local.ini with Space Engineers path
          $content = "[mdk]`noutput = auto`nbinarypath = $binPath"
          Set-Content -Path $mdkLocalIni -Value $content -Encoding UTF8
          
          Write-Host "Configured build environment"
        }
    
    - name: Add GitHub Packages source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/malforge/index.json" `
          --name "GitHub" `
          --username ${{ github.actor }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text
    
    - name: Find demo project
      id: find-demo
      run: |
        $demoProj = Get-ChildItem -Path "libraries\${{ matrix.package_name }}" -Recurse -Filter "*.Demo.csproj" | Select-Object -First 1
        if (-not $demoProj) {
          Write-Error "No demo project (*.Demo.csproj) found in libraries/${{ matrix.package_name }}"
          exit 1
        }
        echo "demo_path=$($demoProj.FullName)" >> $env:GITHUB_OUTPUT
        Write-Host "Found demo project: $($demoProj.FullName)"
    
    - name: Restore demo project
      run: dotnet restore "${{ steps.find-demo.outputs.demo_path }}"
    
    - name: Build demo project in Release (triggers packager)
      run: dotnet build "${{ steps.find-demo.outputs.demo_path }}" -c Release
    
    - name: Find generated NuGet package
      id: find-nupkg
      run: |
        $nupkg = Get-ChildItem -Path "libraries\${{ matrix.package_name }}" -Recurse -Filter "*.nupkg" | Select-Object -First 1
        if (-not $nupkg) {
          Write-Error "No .nupkg file generated for ${{ matrix.package_name }}"
          exit 1
        }
        echo "nupkg_path=$($nupkg.FullName)" >> $env:GITHUB_OUTPUT
        Write-Host "Found package: $($nupkg.FullName)"
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.package_name }}-nuget
        path: ${{ steps.find-nupkg.outputs.nupkg_path }}
        if-no-files-found: error
  
  publish:
    needs: build
    runs-on: windows-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages-nuget
          pattern: '*-nuget'
      
      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
          Get-ChildItem -Path packages-nuget -Filter *.nupkg -Recurse | ForEach-Object {
              Write-Host "Publishing package $($_.Name) to GitHub Packages..."
              dotnet nuget push $_.FullName --source $sourceUrl --api-key $env:GITHUB_TOKEN --skip-duplicate
          }
