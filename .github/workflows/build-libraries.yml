name: Build Libraries

on:
  push:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  pull_request:
    paths:
      - 'libraries/**'
      - '.github/workflows/build-libraries.yml'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build (folder name in libraries/), or leave empty to build all'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      has-packages: ${{ steps.build-summary.outputs.has-packages }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET (for version check)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Add GitHub Packages source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/malforge/index.json" `
          --name "GitHub" `
          --username ${{ github.actor }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text
    
    - name: Quick library version check
      id: version-check
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $ErrorActionPreference = "Stop"
        
        # Determine which libraries to check
        $librariesToCheck = @()
        if ("${{ github.event.inputs.package_name }}" -ne "") {
          $librariesToCheck = @("${{ github.event.inputs.package_name }}")
        } else {
          $allLibraries = Get-ChildItem -Path "libraries" -Directory | Where-Object { $_.Name -ne ".idea" }
          $librariesToCheck = $allLibraries | ForEach-Object { $_.Name }
        }
        
        Write-Host "Checking versions for: $($librariesToCheck -join ', ')"
        $librariesToBuild = @()
        
        foreach ($library in $librariesToCheck) {
          # Find _version file
          $versionFile = Get-ChildItem -Path "libraries\$library" -Recurse -Filter "_version" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $versionFile) {
            Write-Host "$library`: No _version file found, skipping"
            continue
          }
          
          $localVersion = (Get-Content $versionFile.FullName).Trim()
          Write-Host "$library`: Local version is v$localVersion"
          
          # Try to get package info from NuGet feed
          try {
            $result = dotnet package search $library --exact-match --source "GitHub" --format json 2>&1 | Out-String
            
            if ($LASTEXITCODE -eq 0 -and $result -match '\{') {
              $searchResult = $result | ConvertFrom-Json
              $foundPackage = $searchResult.searchResult | Where-Object { $_.packages.id -eq $library } | Select-Object -First 1
              
              if ($foundPackage -and $foundPackage.packages) {
                $publishedVersion = $foundPackage.packages[0].version
                Write-Host "$library`: Published version is v$publishedVersion"
                
                if ($localVersion -eq $publishedVersion) {
                  Write-Host "$library`: Already published, skipping"
                  continue
                }
              }
            }
            
            # If we got here, package doesn't exist or version doesn't match
            Write-Host "$library`: Needs build"
            $librariesToBuild += $library
          } catch {
            Write-Host "$library`: Could not check version, will build"
            $librariesToBuild += $library
          }
        }
        
        if ($librariesToBuild.Count -eq 0) {
          Write-Host "`nNo libraries need building - all current versions already published"
          echo "needs-build=false" >> $env:GITHUB_OUTPUT
          echo "libraries=" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "`nLibraries to build: $($librariesToBuild -join ', ')"
          $librariesJson = ($librariesToBuild | ConvertTo-Json -Compress)
          echo "needs-build=true" >> $env:GITHUB_OUTPUT
          echo "libraries=$librariesJson" >> $env:GITHUB_OUTPUT
        }
    
    - name: Setup SteamCMD
      if: steps.version-check.outputs.needs-build == 'true'
      uses: CyberAndrii/setup-steamcmd@v1.1.5
    
    - name: Install Build Dependencies
      if: steps.version-check.outputs.needs-build == 'true'
      shell: pwsh
      run: |
        $installDir = Join-Path $env:GITHUB_WORKSPACE "se"
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        
        # Try multiple times with different approaches
        $attempts = @(
          "+@sSteamCmdForcePlatformType windows +force_install_dir `"$installDir`" +login anonymous +app_update 298740 validate +quit",
          "+force_install_dir `"$installDir`" +login anonymous +app_update 298740 validate +quit",
          "+@NoPromptForPassword 1 +force_install_dir `"$installDir`" +login anonymous +app_update 298740 +quit"
        )
        
        $success = $false
        foreach ($attempt in $attempts) {
          Write-Host "Trying: steamcmd $attempt"
          $cmd = "steamcmd $attempt"
          Invoke-Expression $cmd
          if ($LASTEXITCODE -eq 0) {
            $success = $true
            break
          }
          Write-Host "Attempt failed with exit code $LASTEXITCODE, trying next approach..."
          Start-Sleep -Seconds 5
        }
        
        if (-not $success) {
          Write-Error "All SteamCMD installation attempts failed"
          exit 1
        }
    
    - name: Setup .NET
      if: steps.version-check.outputs.needs-build == 'true'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    

    
    - name: Clear NuGet cache for Mal.Mdk2 packages
      if: steps.version-check.outputs.needs-build == 'true'
      shell: pwsh
      run: |
        Write-Host "Clearing NuGet cache for Mal.Mdk2.* packages..."
        dotnet nuget locals all --clear
        Write-Host "Cache cleared"
    
    - name: Build Libraries
      if: steps.version-check.outputs.needs-build == 'true'
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $ErrorActionPreference = "Stop"
        
        # Get pre-determined list of libraries from version check
        $librariesJson = '${{ steps.version-check.outputs.libraries }}'
        $packagesToBuild = $librariesJson | ConvertFrom-Json
        if ($packagesToBuild -isnot [array]) {
          $packagesToBuild = @($packagesToBuild)
        }
        
        Write-Host "Building libraries: $($packagesToBuild -join ', ')"
        
        $sedsPath = "$env:GITHUB_WORKSPACE\se"
        $binPath = Join-Path $sedsPath "DedicatedServer64"
        $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
        
        # Verify SteamCMD actually installed SE properly
        Write-Host "Verifying Space Engineers installation..."
        if (-not (Test-Path $sedsPath)) {
          Write-Error "SE installation directory does not exist: $sedsPath"
          exit 1
        }
        
        Write-Host "SE installation directory exists: $sedsPath"
        if (-not (Test-Path $binPath)) {
          Write-Error "DedicatedServer64 directory not found at: $binPath"
          Write-Host "Searching for DedicatedServer64..."
          $found = Get-ChildItem -Path $sedsPath -Recurse -Directory -Filter "DedicatedServer64" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) {
            $binPath = $found.FullName
            Write-Host "Found DedicatedServer64 at alternate location: $binPath"
          } else {
            Write-Error "Could not find DedicatedServer64 directory anywhere in SE installation"
            exit 1
          }
        }
        
        Write-Host "Binary path confirmed: $binPath"
        $dllCount = (Get-ChildItem -Path $binPath -Filter "*.dll" -ErrorAction SilentlyContinue | Measure-Object).Count
        Write-Host "Found $dllCount DLL files in binary path"
        
        if ($dllCount -lt 10) {
          Write-Error "SE installation appears incomplete - only $dllCount DLL files found"
          exit 1
        }
        
        $builtPackages = @()
        $skippedPackages = @()
        
        foreach ($package in $packagesToBuild) {
          Write-Host ""
          Write-Host "=== Processing: $package ===" -ForegroundColor Cyan
          
          # Check if package has a demo project
          $demoProj = Get-ChildItem -Path "libraries\$package" -Recurse -Filter "*.Demo.csproj" | Select-Object -First 1
          if (-not $demoProj) {
            Write-Host "No demo project found - skipping" -ForegroundColor Yellow
            $skippedPackages += $package
            continue
          }
          
          Write-Host "Found demo project: $($demoProj.Name)"
          
          # Update all Mal.Mdk2.* packages to latest versions
          Write-Host "Updating Mal.Mdk2.* packages to latest versions..."
          $csprojPath = $demoProj.FullName
          
          # Get all package references from the csproj
          [xml]$csproj = Get-Content $csprojPath
          $packageRefs = $csproj.Project.ItemGroup.PackageReference | Where-Object { $_.Include -like "Mal.Mdk2.*" }
          
          foreach ($packageRef in $packageRefs) {
            $packageName = $packageRef.Include
            $currentVersion = $packageRef.Version
            Write-Host "  Updating $packageName (current: $currentVersion)..."
            try {
              # Remove then re-add to force update to latest
              dotnet remove "$csprojPath" package $packageName 2>&1 | Out-Null
              dotnet add "$csprojPath" package $packageName 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) {
                Write-Host "    Updated $packageName" -ForegroundColor Green
              }
            } catch {
              Write-Host "    Failed to update $packageName" -ForegroundColor Yellow
            }
          }
          
          # Create mdk.local.ini with Space Engineers path
          $mdkLocalIni = Join-Path $demoProj.Directory.FullName "mdk.local.ini"
          $content = "[mdk]`noutput = auto`nbinarypath = $binPath"
          Set-Content -Path $mdkLocalIni -Value $content -Encoding UTF8
          Write-Host "Created mdk.local.ini"
          
          if (-not (Test-Path $mdkLocalIni)) {
            Write-Error "Failed to create mdk.local.ini"
            exit 1
          }
          
          # Restore and build
          Write-Host "Restoring project..."
          dotnet restore "$($demoProj.FullName)"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to restore $package"
            exit 1
          }
          
          Write-Host "Building project in Release mode..."
          dotnet build "$($demoProj.FullName)" -c Release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to build $package"
            exit 1
          }
          
          # Find generated NuGet package
          $nupkg = Get-ChildItem -Path "libraries\$package" -Recurse -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) {
            Write-Error "No .nupkg file generated for $package"
            exit 1
          }
          
          Write-Host "Found package: $($nupkg.Name)" -ForegroundColor Green
          
          $builtPackages += $package
        }
        
        Write-Host ""
        Write-Host "=== Build Summary ===" -ForegroundColor Cyan
        Write-Host "Built: $($builtPackages.Count) packages"
        if ($builtPackages.Count -gt 0) {
          $builtPackages | ForEach-Object { Write-Host "  - $_" -ForegroundColor Green }
        }
        Write-Host "Skipped: $($skippedPackages.Count) packages"
        if ($skippedPackages.Count -gt 0) {
          $skippedPackages | ForEach-Object { Write-Host "  - $_" -ForegroundColor Yellow }
        }
        
        echo "has-packages=$($builtPackages.Count -gt 0)" >> $env:GITHUB_OUTPUT
    
    - name: Set build summary output
      id: build-summary
      shell: pwsh
      run: |
        $nupkgs = Get-ChildItem -Path "libraries" -Recurse -Filter "*.nupkg"
        $hasPackages = $nupkgs.Count -gt 0
        echo "has-packages=$hasPackages" >> $env:GITHUB_OUTPUT
    
    - name: Upload package artifacts
      if: steps.build-summary.outputs.has-packages == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: libraries/**/*.nupkg
        if-no-files-found: error
  
  publish:
    needs: build
    if: needs.build.outputs.has-packages == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    
    steps:
    - name: Download package artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: packages
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Publish to GitHub Packages
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
        Get-ChildItem -Path packages -Filter *.nupkg -Recurse | ForEach-Object {
            Write-Host "Publishing package $($_.Name) to GitHub Packages..."
            dotnet nuget push $_.FullName --source $sourceUrl --api-key $env:GITHUB_TOKEN --skip-duplicate
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Successfully published $($_.Name)" -ForegroundColor Green
            } else {
              Write-Warning "Failed to publish $($_.Name)"
            }
        }
