name: Build Package

on:
  push:
    paths:
      - 'packages/**'
      - '.github/workflows/build-package.yml'
  pull_request:
    paths:
      - 'packages/**'
      - '.github/workflows/build-package.yml'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package name to build (folder name in packages/), or leave empty to build all'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed-packages.outputs.packages }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Detect changed packages
      id: changed-packages
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          if [ -n "${{ github.event.inputs.package_name }}" ]; then
            # Build specific package
            echo "packages=[\"${{ github.event.inputs.package_name }}\"]" >> $GITHUB_OUTPUT
          else
            # Build all packages when manually triggered without package name
            PACKAGES=$(find packages -mindepth 1 -maxdepth 1 -type d ! -name ".idea" -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "Building all packages: $PACKAGES"
          fi
        else
          # Get changed files in packages/ directory
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep '^packages/' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract unique package folder names
          PACKAGES=$(echo "$CHANGED_FILES" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Changed packages: $PACKAGES"
        fi

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: windows-latest
    strategy:
      matrix:
        package_name: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Add GitHub Packages source
      run: |
        dotnet nuget add source "https://nuget.pkg.github.com/malforge/index.json" `
          --name "GitHub" `
          --username ${{ github.actor }} `
          --password ${{ secrets.GITHUB_TOKEN }} `
          --store-password-in-clear-text
    
    - name: Install packager tool
      run: dotnet tool install --global Mal.Mdk2.SharedNugetBuilder
    
    - name: Verify package exists
      run: |
        if (-not (Test-Path "packages\${{ matrix.package_name }}")) {
          Write-Error "Package '${{ matrix.package_name }}' not found in packages/ directory"
          exit 1
        }
    
    - name: Find shared project
      id: find-shproj
      run: |
        $shproj = Get-ChildItem -Path "packages\${{ matrix.package_name }}" -Recurse -Filter "*.shproj" | Select-Object -First 1
        if (-not $shproj) {
          Write-Error "No .shproj file found in packages/${{ matrix.package_name }}"
          exit 1
        }
        echo "shproj_path=$($shproj.FullName)" >> $env:GITHUB_OUTPUT
        Write-Host "Found shared project: $($shproj.FullName)"
    
    - name: Create output directory
      run: New-Item -Path "output" -ItemType Directory -Force
    
    - name: Run packager tool
      run: mdk2-sharednuget --shared "${{ steps.find-shproj.outputs.shproj_path }}" --output "output"
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.package_name }}-nuget
        path: output/**/*.nupkg
        if-no-files-found: error
  
  publish:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages-nuget
          pattern: '*-nuget'
      
      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sourceUrl = "https://nuget.pkg.github.com/malforge/index.json"
          Get-ChildItem -Path packages-nuget -Filter *.nupkg -Recurse | ForEach-Object {
              Write-Host "Publishing package $($_.Name) to GitHub Packages..."
              dotnet nuget push $_.FullName --source $sourceUrl --api-key $env:GITHUB_TOKEN --skip-duplicate
          }
